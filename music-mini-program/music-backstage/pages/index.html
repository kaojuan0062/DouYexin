	<script type="text/javascript">
		new Vue({
			el: "#index",
			data() {

					menusList: [{
						id: 0,
						mioc: "",
						mname: "",
						murl: "",
						pid: 0
					}]

				}
			},
			created() {
				this.getMenuListOfAdm();
			},
			methods: {
				//获取当前存储的对象信息
				getMenuListOfAdm: function() {
					//获取本地存储信息
					const adm = JSON.parse(window.localStorage.getItem("admin"));
					console.log("获取的当前账号菜单数据信息===", adm);

					console.log("当前菜单数据======", adm.menus);
					this.menusList = JSON.parse(JSON.stringify(adm.menus));

				}
			},
		})
